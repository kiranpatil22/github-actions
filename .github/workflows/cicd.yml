---
name: CICD
on:
  workflow_dispatch: 
    inputs:
      environments:
        description: this is the environment value where this workflow runs 
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: building docker container
        run: echo "Docker container build"
  test:
    needs: [build,code]
    runs-on: ubuntu-latest
    steps:
      - name: testig the container
        run: echo "Testing the container"
  deploy:
    if: inputs.environments == 'dev'
    needs: [test,build,code]
    runs-on: ubuntu-latest
    steps:
      - name: deploying the app
        run: echo "docker compose deployed the app"
