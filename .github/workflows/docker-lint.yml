#scan dockerfile with with issues and vulnerabilities using hadolint and trivy
name: docker lint

on:
    workflow_call:
jobs:
    validate-dockerfile:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: install hadolint for dockerfile linting
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: Dockerfile